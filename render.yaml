services:
  - type: web
    name: breatheesg-assignment
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: breathe_esg.settings.prod
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: breatheesg-assignment-1-pr4x.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://breatheesg-assignment-1-pr4x.onrender.com
